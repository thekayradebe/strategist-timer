<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Strategist Co-Working Timer</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: #2a2018;
  }
  body {
    background-size: cover;
    background-position: center;
    font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif;
    cursor: default;
  }
  body.hide-cursor { cursor: none; }

  #panel {
    position: fixed;
    top: 3vh;
    left: 50%;
    transform: translateX(-50%) rotate(-0.6deg);
    background: #f7f0e0;
    color: #17140f;
    border: 3px solid #17140f;
    border-radius: 16px;
    box-shadow: 0 6px 18px rgba(40, 25, 5, 0.35);
    padding: 14px 34px 16px;
    text-align: center;
    min-width: 240px;
    transition: background 0.6s ease;
    z-index: 3;
  }
  #panel.break { background: #bfe3b2; }

  #phase {
    font-size: 21px;
    font-weight: 800;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  #countdown {
    font-size: 72px;
    font-weight: 800;
    line-height: 1.05;
    font-variant-numeric: tabular-nums;
    letter-spacing: 2px;
  }
  #bar-track {
    height: 7px;
    background: rgba(23, 20, 15, 0.18);
    border-radius: 4px;
    margin: 10px 2px 8px;
    overflow: hidden;
  }
  #bar-fill {
    height: 100%;
    width: 0%;
    background: #17140f;
    border-radius: 4px;
    transition: width 0.3s linear;
  }
  #clock {
    font-size: 15px;
    font-weight: 600;
    opacity: 0.75;
    letter-spacing: 1px;
  }

  /* Full-screen tint that pulses on a transition */
  #flash {
    position: fixed;
    inset: 0;
    opacity: 0;
    pointer-events: none;
    z-index: 4;
  }
  /* Big centered countdown number / word */
  #bigcue {
    position: fixed;
    top: 44%;
    left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0;
    pointer-events: none;
    z-index: 5;
    color: #ffffff;
    font-weight: 800;
    font-size: 24vh;
    line-height: 1;
    letter-spacing: 2px;
    text-shadow: 0 3px 10px rgba(0,0,0,0.55), 0 0 3px rgba(0,0,0,0.9);
    white-space: nowrap;
  }

  #hint {
    position: fixed;
    bottom: 2.5vh;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(23, 20, 15, 0.75);
    color: #f5efdf;
    font-size: 14px;
    padding: 8px 18px;
    border-radius: 20px;
    transition: opacity 1.5s ease;
    text-align: center;
    max-width: 84vw;
    z-index: 6;
  }
  #hint.gone { opacity: 0; pointer-events: none; }

  #sound {
    position: fixed;
    bottom: 2.5vh;
    right: 2.5vh;
    background: rgba(23, 20, 15, 0.75);
    color: #f5efdf;
    font-size: 15px;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 20px;
    cursor: pointer;
    user-select: none;
    transition: opacity 1s ease;
    z-index: 6;
  }
  #sound.icon { font-size: 21px; padding: 7px 13px; }
  #sound.needs-arm { animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 0.72; } 50% { opacity: 1; } }
  body.hide-cursor #sound.icon { opacity: 0; }
</style>
</head>
<body>
  <div id="flash"></div>
  <div id="bigcue"></div>
  <div id="panel">
    <div id="phase">Focus</div>
    <div id="countdown">50:00</div>
    <div id="bar-track"><div id="bar-fill"></div></div>
    <div id="clock"></div>
  </div>
  <div id="hint">Double-click for fullscreen &nbsp;&middot;&nbsp; Keys 1&ndash;9 or &larr; &rarr; switch backgrounds &nbsp;&middot;&nbsp; M mutes &nbsp;&middot;&nbsp; P previews the countdown</div>
  <div id="sound" class="needs-arm">&#128276; Enable chimes</div>

<script>
  const panel = document.getElementById("panel");
  const phaseEl = document.getElementById("phase");
  const countdownEl = document.getElementById("countdown");
  const barFill = document.getElementById("bar-fill");
  const clockEl = document.getElementById("clock");
  const hint = document.getElementById("hint");
  const soundEl = document.getElementById("sound");
  const flashEl = document.getElementById("flash");
  const bigcue = document.getElementById("bigcue");

  const FOCUS_SECONDS = 50 * 60;   // focus runs 00:00 -> 50:00 of each hour
  const HOUR_SECONDS = 60 * 60;

  function pad(n) { return String(n).padStart(2, "0"); }

  function store(key, val) {
    try { localStorage.setItem(key, val); } catch (e) {}
  }
  function recall(key) {
    try { return localStorage.getItem(key); } catch (e) { return null; }
  }

  /* ---------- Sound (Web Audio, no files needed) ---------- */
  let audioCtx = null;
  let muted = recall("muted") === "1";

  function updateSoundUI() {
    soundEl.classList.add("icon");
    soundEl.classList.remove("needs-arm");
    soundEl.textContent = muted ? "🔇" : "🔊";
  }

  function armAudio() {
    if (audioCtx) return;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) { return; }
    if (audioCtx.state === "suspended") { audioCtx.resume(); }
    updateSoundUI();
    if (!muted) { tone(660, 0, 0.12, 0.05, "sine"); }  // soft "sound is on" blip
  }

  function tone(freq, startOffset, duration, peak, type) {
    if (!audioCtx || muted) return;
    const t0 = audioCtx.currentTime + startOffset;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type || "sine";
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.exponentialRampToValueAtTime(peak, t0 + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(t0);
    osc.stop(t0 + duration + 0.05);
  }

  function beep() { tone(880, 0, 0.18, 0.16, "square"); }        // 3 / 2 / 1 countdown
  function goTone() { tone(1320, 0, 0.4, 0.18, "sine"); }        // top of hour: focus begins
  function chime() {                                             // 50 min up: break begins
    tone(880, 0.0, 0.6, 0.16, "sine");
    tone(1108, 0.18, 0.6, 0.15, "sine");
    tone(1320, 0.36, 0.9, 0.15, "sine");
  }

  function onSoundControl() {
    const firstArm = !audioCtx;
    armAudio();
    if (!firstArm) {
      muted = !muted;
      store("muted", muted ? "1" : "0");
      updateSoundUI();
      if (!muted) { tone(660, 0, 0.12, 0.06, "sine"); }
    }
  }
  soundEl.addEventListener("click", onSoundControl);

  /* ---------- Visual cues (seen even when tab audio isn't shared) ---------- */
  function showCue(text, holdMs) {
    bigcue.textContent = text;
    bigcue.animate(
      [
        { transform: "translate(-50%,-50%) scale(0.5)", opacity: 0 },
        { transform: "translate(-50%,-50%) scale(1.08)", opacity: 1, offset: 0.25 },
        { transform: "translate(-50%,-50%) scale(1.0)", opacity: 1, offset: 0.7 },
        { transform: "translate(-50%,-50%) scale(1.0)", opacity: 0 }
      ],
      { duration: holdMs, easing: "ease-out" }
    );
  }

  function flash(color) {
    flashEl.style.background = color;
    flashEl.animate(
      [ { opacity: 0 }, { opacity: 0.42, offset: 0.15 }, { opacity: 0 } ],
      { duration: 1200, easing: "ease-out" }
    );
  }

  function focusStart() { goTone(); showCue("FOCUS", 1700); flash("#f4d24a"); }
  function breakStart() { chime(); showCue("BREAK", 1900); flash("#8fd18a"); }

  // Rehearsal: press P to preview the full 3-2-1 -> FOCUS -> BREAK sequence anytime.
  function previewSequence() {
    armAudio();
    setTimeout(function () { beep(); showCue("3", 900); }, 0);
    setTimeout(function () { beep(); showCue("2", 900); }, 1000);
    setTimeout(function () { beep(); showCue("1", 900); }, 2000);
    setTimeout(focusStart, 3000);
    setTimeout(breakStart, 5400);
  }

  /* ---------- Timer + transition triggers ---------- */
  let lastSec = null;

  function handleTransitions(secOfHour) {
    if (lastSec === null) { lastSec = secOfHour; return; }  // don't fire on first load
    if (secOfHour === lastSec) return;
    lastSec = secOfHour;
    if (secOfHour >= 3597 && secOfHour <= 3599) {
      beep();                                 // 3, 2, 1 into the top of the hour
      showCue(String(3600 - secOfHour), 900);
    } else if (secOfHour === 0) {
      focusStart();                           // focus session begins
    } else if (secOfHour === FOCUS_SECONDS) {
      breakStart();                           // 50 minutes up -> break
    }
  }

  function tick() {
    const now = new Date();
    const secOfHour = now.getMinutes() * 60 + now.getSeconds();
    const isFocus = secOfHour < FOCUS_SECONDS;

    const blockLength = isFocus ? FOCUS_SECONDS : HOUR_SECONDS - FOCUS_SECONDS;
    const elapsed = isFocus ? secOfHour : secOfHour - FOCUS_SECONDS;
    const remaining = blockLength - elapsed;

    phaseEl.textContent = isFocus ? "Focus" : "Break";
    panel.classList.toggle("break", !isFocus);
    countdownEl.textContent = pad(Math.floor(remaining / 60)) + ":" + pad(remaining % 60);
    barFill.style.width = (elapsed / blockLength * 100).toFixed(2) + "%";

    let h = now.getHours();
    const ampm = h >= 12 ? "PM" : "AM";
    h = h % 12 || 12;
    clockEl.textContent = h + ":" + pad(now.getMinutes()) + " " + ampm;

    document.title = (isFocus ? "Focus " : "Break ") + countdownEl.textContent;

    handleTransitions(secOfHour);
  }

  tick();
  setInterval(tick, 250);

  /* ---------- Background switching (images/image-1 .. image-9) ---------- */
  const MAX_IMAGES = 9;
  const sources = {};
  let available = [];
  let current = null;

  function setBackground(n) {
    if (!sources[n]) return;
    current = n;
    document.body.style.backgroundImage = 'url("' + sources[n] + '")';
    store("bg-index", n);
  }

  let pendingProbes = 0;
  function probe(n, ext) {
    pendingProbes++;
    const im = new Image();
    im.onload = function () {
      if (!sources[n]) sources[n] = "images/image-" + n + "." + ext;
      probeDone();
    };
    im.onerror = probeDone;
    im.src = "images/image-" + n + "." + ext;
  }
  function probeDone() {
    if (--pendingProbes > 0) return;
    available = Object.keys(sources).map(Number).sort(function (a, b) { return a - b; });
    if (available.length === 0) {
      hint.textContent = "No backgrounds found - add image-1.png (up to image-9.png) to the images folder next to this file.";
      hint.classList.remove("gone");
      return;
    }
    const stored = parseInt(recall("bg-index"), 10);
    setBackground(available.indexOf(stored) !== -1 ? stored : available[0]);
  }
  for (let i = 1; i <= MAX_IMAGES; i++) {
    probe(i, "png");
    probe(i, "jpg");
  }

  /* ---------- Input ---------- */
  document.addEventListener("keydown", function (e) {
    armAudio();
    if (e.key === "m" || e.key === "M") { onSoundControl(); return; }
    if (e.key === "p" || e.key === "P") { previewSequence(); return; }
    const digit = parseInt(e.key, 10);
    if (digit >= 1 && digit <= MAX_IMAGES) {
      setBackground(digit);
    } else if ((e.key === "ArrowRight" || e.key === "ArrowLeft") && available.length > 0) {
      const idx = Math.max(0, available.indexOf(current));
      const step = e.key === "ArrowRight" ? 1 : -1;
      setBackground(available[(idx + step + available.length) % available.length]);
    }
  });

  document.addEventListener("dblclick", function () {
    armAudio();
    if (document.fullscreenElement) {
      document.exitFullscreen();
    } else {
      document.documentElement.requestFullscreen();
    }
  });

  setTimeout(function () { hint.classList.add("gone"); }, 8000);

  let cursorTimer;
  document.addEventListener("mousemove", function () {
    document.body.classList.remove("hide-cursor");
    clearTimeout(cursorTimer);
    cursorTimer = setTimeout(function () {
      document.body.classList.add("hide-cursor");
    }, 3000);
  });
</script>
</body>
</html>
