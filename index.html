    cursor: default;

    user-select: none;

  body.hide-controls { cursor: none; }

  #panel {
    position: fixed;
    top: 3dvh;
    left: 50%;
    transform: translateX(-50%) rotate(-0.6deg);
    background: #f7f0e0;
    color: #17140f;
    border: 3px solid #17140f;
    border-radius: 16px;
    box-shadow: 0 6px 18px rgba(40, 25, 5, 0.35);
    padding: 14px 34px 16px;
    text-align: center;
    min-width: 240px;
    transition: background 0.6s ease;
    z-index: 3;
  }
  #panel.break { background: #bfe3b2; }

  #phase {
    font-size: 21px;
    font-weight: 800;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  #countdown {
    font-size: 72px;
    font-weight: 800;
    line-height: 1.05;
    font-variant-numeric: tabular-nums;
    letter-spacing: 2px;
  }
  #bar-track {
    height: 7px;
    background: rgba(23, 20, 15, 0.18);
    border-radius: 4px;
    margin: 10px 2px 8px;
    overflow: hidden;
  }
  #bar-fill {
    height: 100%;
    width: 0%;
    background: #17140f;
    border-radius: 4px;
    transition: width 0.3s linear;
  }
  #clock {
    font-size: 15px;
    font-weight: 600;
    opacity: 0.75;
    letter-spacing: 1px;
  }

  #flash {
    position: fixed;
    inset: 0;
    opacity: 0;
    pointer-events: none;
    z-index: 4;
  }
  #bigcue {
    position: fixed;
    top: 46%;
    left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0;
    pointer-events: none;
    z-index: 5;
    color: #ffffff;
    font-weight: 800;
    font-size: min(23vh, 19vw);
    line-height: 1;
    letter-spacing: 2px;
    text-shadow: 0 3px 10px rgba(0,0,0,0.55), 0 0 3px rgba(0,0,0,0.9);
    white-space: nowrap;
  }

  #controls {
    position: fixed;
    bottom: 2.5dvh;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    align-items: center;
    z-index: 6;
    transition: opacity 1s ease;
  }
  body.hide-controls #controls { opacity: 0; pointer-events: none; }

  .pill {
    background: rgba(23, 20, 15, 0.78);
    color: #f5efdf;
    font-size: 15px;
    font-weight: 600;
    padding: 9px 16px;
    border-radius: 20px;
    cursor: pointer;
    white-space: nowrap;
  }
  #sound.needs-arm { animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 0.75; } 50% { opacity: 1; } }
  @media (prefers-reduced-motion: reduce) {
    #sound.needs-arm { animation: none; }
    #bar-fill { transition: none; }
  }
</style>
</head>
<body>
<div id="flash"></div>
<div id="bigcue"></div>
<div id="panel">
  <div id="phase">Focus</div>
  <div id="countdown">50:00</div>
  <div id="bar-track"><div id="bar-fill"></div></div>
  <div id="clock"></div>
</div>
<div id="controls">
  <div id="sound" class="pill needs-arm">&#128276; Tap to enable chimes</div>
  <div id="test" class="pill" style="display:none;">&#9654; Test</div>
</div>

<script>
  const panel = document.getElementById("panel");
  const phaseEl = document.getElementById("phase");
  const countdownEl = document.getElementById("countdown");
  const barFill = document.getElementById("bar-fill");
  const clockEl = document.getElementById("clock");
  const soundEl = document.getElementById("sound");
  const testEl = document.getElementById("test");
  const flashEl = document.getElementById("flash");
  const bigcue = document.getElementById("bigcue");

  const FOCUS_SECONDS = 50 * 60;   // focus runs 00:00 -> 50:00 of each hour
  const HOUR_SECONDS = 60 * 60;

  function pad(n) { return String(n).padStart(2, "0"); }

  /* ---------- Sound (Web Audio, no files, best-effort on tablets) ---------- */
  let audioCtx = null;
  let muted = false;

  function updateSoundUI() {
    soundEl.classList.remove("needs-arm");
    soundEl.textContent = muted ? "🔇 Sound off" : "🔊 Sound on";
    testEl.style.display = "";
  }

  function armAudio() {
    if (audioCtx) return;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) { return; }
    if (audioCtx.state === "suspended") { audioCtx.resume(); }
    updateSoundUI();
    if (!muted) { tone(660, 0, 0.12, 0.05, "sine"); }  // confirmation blip
  }

  function tone(freq, startOffset, duration, peak, type) {
    if (!audioCtx || muted) return;
    const t0 = audioCtx.currentTime + startOffset;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type || "sine";
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.exponentialRampToValueAtTime(peak, t0 + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(t0);
    osc.stop(t0 + duration + 0.05);
  }

  function beep() { tone(880, 0, 0.18, 0.16, "square"); }
  function goTone() { tone(1320, 0, 0.4, 0.18, "sine"); }
  function chime() {
    tone(880, 0.0, 0.6, 0.16, "sine");
    tone(1108, 0.18, 0.6, 0.15, "sine");
    tone(1320, 0.36, 0.9, 0.15, "sine");
  }

  /* ---------- Visual cues (always work, even with no sound) ---------- */
  function showCue(text, holdMs) {
    bigcue.textContent = text;
    bigcue.animate(
      [
        { transform: "translate(-50%,-50%) scale(0.5)", opacity: 0 },
        { transform: "translate(-50%,-50%) scale(1.08)", opacity: 1, offset: 0.25 },
        { transform: "translate(-50%,-50%) scale(1.0)", opacity: 1, offset: 0.7 },
        { transform: "translate(-50%,-50%) scale(1.0)", opacity: 0 }
      ],
      { duration: holdMs, easing: "ease-out" }
    );
  }

  function flash(color) {
    flashEl.style.background = color;
    flashEl.animate(
      [ { opacity: 0 }, { opacity: 0.42, offset: 0.15 }, { opacity: 0 } ],
      { duration: 1200, easing: "ease-out" }
    );
  }

  function focusStart() { goTone(); showCue("FOCUS", 1700); flash("#f4d24a"); }
  function breakStart() { chime(); showCue("BREAK", 1900); flash("#8fd18a"); }

  function previewSequence() {
    armAudio();
    setTimeout(function () { beep(); showCue("3", 900); }, 0);
    setTimeout(function () { beep(); showCue("2", 900); }, 1000);
    setTimeout(function () { beep(); showCue("1", 900); }, 2000);
    setTimeout(focusStart, 3000);
    setTimeout(breakStart, 5400);
  }

  /* ---------- Timer + transition triggers ---------- */
  let lastSec = null;

  function handleTransitions(secOfHour) {
    if (lastSec === null) { lastSec = secOfHour; return; }
    if (secOfHour === lastSec) return;
    lastSec = secOfHour;
    if (secOfHour >= 3597 && secOfHour <= 3599) {
      beep();
      showCue(String(3600 - secOfHour), 900);
    } else if (secOfHour === 0) {
      focusStart();
    } else if (secOfHour === FOCUS_SECONDS) {
      breakStart();
    }
  }

  function tick() {
    const now = new Date();
    const secOfHour = now.getMinutes() * 60 + now.getSeconds();
    const isFocus = secOfHour < FOCUS_SECONDS;

    const blockLength = isFocus ? FOCUS_SECONDS : HOUR_SECONDS - FOCUS_SECONDS;
    const elapsed = isFocus ? secOfHour : secOfHour - FOCUS_SECONDS;
    const remaining = blockLength - elapsed;

    phaseEl.textContent = isFocus ? "Focus" : "Break";
    panel.classList.toggle("break", !isFocus);
    countdownEl.textContent = pad(Math.floor(remaining / 60)) + ":" + pad(remaining % 60);
    barFill.style.width = (elapsed / blockLength * 100).toFixed(2) + "%";

    let h = now.getHours();
    const ampm = h >= 12 ? "PM" : "AM";
    h = h % 12 || 12;
    clockEl.textContent = h + ":" + pad(now.getMinutes()) + " " + ampm;

    document.title = (isFocus ? "Focus " : "Break ") + countdownEl.textContent;

    handleTransitions(secOfHour);
  }

  tick();
  setInterval(tick, 250);

  /* ---------- Controls: tap to arm / mute, Test to rehearse ---------- */
  function onSoundTap(e) {
    e.stopPropagation();
    if (!audioCtx) { armAudio(); return; }   // first tap arms (sound on)
    muted = !muted;
    updateSoundUI();
    if (!muted) { tone(660, 0, 0.12, 0.06, "sine"); }
  }
  soundEl.addEventListener("click", onSoundTap);
  testEl.addEventListener("click", function (e) { e.stopPropagation(); previewSequence(); });

  // Keyboard extras for anyone on a laptop (harmless on iPad)
  document.addEventListener("keydown", function (e) {
    armAudio();
    if (e.key === "m" || e.key === "M") { onSoundTap(e); }
    else if (e.key === "p" || e.key === "P") { previewSequence(); }
  });

  // Double-tap / double-click: best-effort fullscreen (works where the browser allows it)
  document.addEventListener("dblclick", function () {
    const el = document.documentElement;
    if (document.fullscreenElement) {
      if (document.exitFullscreen) document.exitFullscreen();
    } else if (el.requestFullscreen) {
      el.requestFullscreen().catch(function () {});
    }
  });

  /* ---------- Show controls on activity, fade when idle ---------- */
  let idleTimer;
  function activity() {
    document.body.classList.remove("hide-controls");
    clearTimeout(idleTimer);
    idleTimer = setTimeout(function () {
      document.body.classList.add("hide-controls");
    }, 3500);
  }
  document.addEventListener("mousemove", activity);
  document.addEventListener("touchstart", function () { armAudio(); activity(); }, { passive: true });
  activity();
</script>
</body>
